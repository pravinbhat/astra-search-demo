<section class="search-modes" role="tablist" aria-label="Search modes">
    <button class="mode-tab active" data-mode="filter" role="tab" aria-selected="true" aria-controls="filter-panel">
        <span class="mode-icon">🔍</span>
        <span class="mode-label">Filter Search</span>
        <span class="mode-description">Metadata filtering</span>
    </button>
    <button class="mode-tab" data-mode="semantic" role="tab" aria-selected="false" aria-controls="semantic-panel">
        <span class="mode-icon">🧠</span>
        <span class="mode-label">Semantic Search</span>
        <span class="mode-description">Natural language</span>
    </button>
    <button class="mode-tab" data-mode="lexical" role="tab" aria-selected="false" aria-controls="lexical-panel">
        <span class="mode-icon">📝</span>
        <span class="mode-label">Lexical Search</span>
        <span class="mode-description">Keyword matching</span>
    </button>
    <button class="mode-tab" data-mode="hybrid" role="tab" aria-selected="false" aria-controls="hybrid-panel">
        <span class="mode-icon">⚡</span>
        <span class="mode-label">Hybrid Search</span>
        <span class="mode-description">Combined approach</span>
    </button>
    <button class="mode-tab" data-mode="comparison" role="tab" aria-selected="false" aria-controls="comparison-panel">
        <span class="mode-icon">📊</span>
        <span class="mode-label">Compare Modes</span>
        <span class="mode-description">Side-by-side</span>
    </button>
</section>
