<div id="semantic-panel" class="search-panel" role="tabpanel" aria-labelledby="semantic-tab">
    <div class="panel-header">
        <h2>Semantic Search</h2>
        <p class="panel-description">Search using natural language queries powered by vector embeddings</p>
    </div>
    <div class="search-input-group">
        <label for="semantic-query" class="input-label">Query</label>
        <textarea 
            id="semantic-query" 
            class="search-textarea" 
            placeholder="e.g., books about resilience and survival in dystopian futures"
            rows="3"
            aria-describedby="semantic-help"
        ></textarea>
        <p id="semantic-help" class="input-help">Enter the query to use for this search</p>
    </div>
    <details class="filter-accordion">
        <summary>Optional: Add Metadata Filters</summary>
        <div id="semantic-filter-builder" class="filter-builder"></div>
    </details>
    <div class="search-actions">
        <div class="results-limit-control">
            <label for="semantic-results-limit" class="limit-label">Results:</label>
            <select id="semantic-results-limit" class="limit-selector" aria-label="Number of results to display">
                <option value="15" selected>15</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
        <button id="semantic-search-btn" class="btn btn-primary">
            <span class="btn-icon">🧠</span>
            Semantic Search
        </button>
        <button id="semantic-clear-btn" class="btn btn-secondary">Clear</button>
    </div>
</div>
